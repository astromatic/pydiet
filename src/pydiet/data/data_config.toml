#
# Data configuration for PyDIET
#
# The format is TOML (https://toml.io)
# Numerical quantities must be written as strings and support physical units

# Parent path for all data files
path = "data"

####################### Table array of observatory sites ######################

[[sites]]
default = true
id = 'mko'
name = "Mauna Kea Observatories"
description = "Mauna Kea Observatories, Hawaii, USA"
altitude = "4205 m"
path = "sites/mko"
[sites.transmission]
# Atmospheric transmission at Mauna Kea Observatories at various airmasses:
# - Computed by E.Bertin (2025) using MODTRAN6, using the default "tropical"
#   atmosphere and the "rural" aerosol model settings.
# -  Pointing upward from an altitude of 4204m.
# -  CO2 concentration set to 430ppm.
path = "transmission"
files = [
    { vars = {am = 1.0}, file = "MKO_transmission.AM1.0.fits", default=true },
    { vars = {am = 1.1}, file = "MKO_transmission.AM1.1.fits" },
    { vars = {am = 1.2}, file = "MKO_transmission.AM1.2.fits" },
    { vars = {am = 1.3}, file = "MKO_transmission.AM1.3.fits" },
    { vars = {am = 1.4}, file = "MKO_transmission.AM1.4.fits" },
    { vars = {am = 1.5}, file = "MKO_transmission.AM1.5.fits" },
    { vars = {am = 1.6}, file = "MKO_transmission.AM1.6.fits" },
    { vars = {am = 1.7}, file = "MKO_transmission.AM1.7.fits" },
    { vars = {am = 1.8}, file = "MKO_transmission.AM1.8.fits" },
    { vars = {am = 1.9}, file = "MKO_transmission.AM1.9.fits" },
    { vars = {am = 2.0}, file = "MKO_transmission.AM2.0.fits" },
    { vars = {am = 2.5}, file = "MKO_transmission.AM2.5.fits" },
    { vars = {am = 3.0}, file = "MKO_transmission.AM3.0.fits" },
    { vars = {am = 3.5}, file = "MKO_transmission.AM3.5.fits" },
    { vars = {am = 4.0}, file = "MKO_transmission.AM4.0.fits" },
    { vars = {am = 4.5}, file = "MKO_transmission.AM4.5.fits" },
    { vars = {am = 5.0}, file = "MKO_transmission.AM5.0.fits" }
]
[sites.emission]
# Sky emission models
path = "emission"
files = [
# ESO SkyCalc sky emission model computed with default settings
# (except for the Moon set at -90 deg elevation).
    { vars = {sky='dark', am=1.0}, file = "MKO_emission.dark.AM1.0.fits", default=true },
    { vars = {sky='dark', am=1.1}, file = "MKO_emission.dark.AM1.1.fits" },
    { vars = {sky='dark', am=1.2}, file = "MKO_emission.dark.AM1.2.fits" },
    { vars = {sky='dark', am=1.3}, file = "MKO_emission.dark.AM1.3.fits" },
    { vars = {sky='dark', am=1.4}, file = "MKO_emission.dark.AM1.4.fits" },
    { vars = {sky='dark', am=1.5}, file = "MKO_emission.dark.AM1.5.fits" },
    { vars = {sky='dark', am=1.6}, file = "MKO_emission.dark.AM1.6.fits" },
    { vars = {sky='dark', am=1.7}, file = "MKO_emission.dark.AM1.7.fits" },
    { vars = {sky='dark', am=1.8}, file = "MKO_emission.dark.AM1.8.fits" },
    { vars = {sky='dark', am=1.9}, file = "MKO_emission.dark.AM1.9.fits" },
    { vars = {sky='dark', am=2.0}, file = "MKO_emission.dark.AM2.0.fits" },
    { vars = {sky='dark', am=2.5}, file = "MKO_emission.dark.AM2.5.fits" },
    { vars = {sky='dark', am=3.0}, file = "MKO_emission.dark.AM3.0.fits" },
# ESO SkyCalc sky emission model with 30% Moon component
# (66.4 deg phase at 45 deg elevation and 45 deg distance).
    { vars = {sky='grey', am=1.0}, file = "MKO_emission.grey.AM1.0.fits" },
    { vars = {sky='grey', am=1.1}, file = "MKO_emission.grey.AM1.1.fits" },
    { vars = {sky='grey', am=1.2}, file = "MKO_emission.grey.AM1.2.fits" },
    { vars = {sky='grey', am=1.3}, file = "MKO_emission.grey.AM1.3.fits" },
    { vars = {sky='grey', am=1.4}, file = "MKO_emission.grey.AM1.4.fits" },
    { vars = {sky='grey', am=1.5}, file = "MKO_emission.grey.AM1.5.fits" },
    { vars = {sky='grey', am=1.6}, file = "MKO_emission.grey.AM1.6.fits" },
    { vars = {sky='grey', am=1.7}, file = "MKO_emission.grey.AM1.7.fits" },
    { vars = {sky='grey', am=1.8}, file = "MKO_emission.grey.AM1.8.fits" },
    { vars = {sky='grey', am=1.9}, file = "MKO_emission.grey.AM1.9.fits" },
    { vars = {sky='grey', am=2.0}, file = "MKO_emission.grey.AM2.0.fits" },
    { vars = {sky='grey', am=2.5}, file = "MKO_emission.grey.AM2.5.fits" },
    { vars = {sky='grey', am=3.0}, file = "MKO_emission.grey.AM3.0.fits" },
# ESO SkyCalc sky emission model with 60% Moon component 
# (101.5 deg phase, at 45 deg elevation and 45 deg distance).
    { vars = {sky='bright', am=1.0}, file = "MKO_emission.bright.AM1.0.fits", default=true },
    { vars = {sky='bright', am=1.1}, file = "MKO_emission.bright.AM1.1.fits" },
    { vars = {sky='bright', am=1.2}, file = "MKO_emission.bright.AM1.2.fits" },
    { vars = {sky='bright', am=1.3}, file = "MKO_emission.bright.AM1.3.fits" },
    { vars = {sky='bright', am=1.4}, file = "MKO_emission.bright.AM1.4.fits" },
    { vars = {sky='bright', am=1.5}, file = "MKO_emission.bright.AM1.5.fits" },
    { vars = {sky='bright', am=1.6}, file = "MKO_emission.bright.AM1.6.fits" },
    { vars = {sky='bright', am=1.7}, file = "MKO_emission.bright.AM1.7.fits" },
    { vars = {sky='bright', am=1.8}, file = "MKO_emission.bright.AM1.8.fits" },
    { vars = {sky='bright', am=1.9}, file = "MKO_emission.bright.AM1.9.fits" },
    { vars = {sky='bright', am=2.0}, file = "MKO_emission.bright.AM2.0.fits" },
    { vars = {sky='bright', am=2.5}, file = "MKO_emission.bright.AM2.5.fits" },
    { vars = {sky='bright', am=3.0}, file = "MKO_emission.bright.AM3.0.fits" }
]


######################### Table array of telescopes ###########################

[[telescopes]]
default = true
id = 'cfht'
name = "CFHT"
description = "Canada-France-Hawaii 3.6m telescope"
path = "telescopes/cfht"
# Full collecting area _including_ possible mirror hole and spider branches
collecting_area = "10.134 m2" # from CFHT's observatory manual: 3.592m diameter
# Default obstruction area (only used if not specified for the instrument)
obstruction_area = "0.974 m2" # 0.951m diameter hole and 4x5cm spider branches
[telescopes.transmission]
# Transmission curves for the CFHT 3.6m telescope
path = "transmission"
files = [ {file = "CFHT_M1_transmission.fits"} ]
[telescopes.emission]
# Emission curves for the CFHT 3.6m telescope
temperatures = ["273 K"]


########################## Table array of instruments #########################

[[instruments]]
# MegaCam/MegaPrime instrument. All infos derived from the MegaCam web pages at
# https://www.cfht.hawaii.edu/Instruments/Imaging/Megacam/index.html
default = true
id = 'megacam'
name = "MegaCam"
description = "The MegaPrime/MegaCam instrument"
path = "instruments/megacam"
wavelength_range = "[250., 1050.] nm"
obstruction_area = "2.112 m2" # Forged by subtracting 
overhead = "40 s"
site_id = 'mko'
telescope_id = 'cfht'
[instruments.optics]
# MegaPrime/MegaCam optical properties
path = "optics"
[instruments.optics.transmission]
# Transmission as a function of wavelength for all MegaPrime optical components
path = "transmission"
files = [ {file = "MegaPrime_transmission.fits"} ]
[instruments.optics.emission]
# Emission as a function of wavelength for all MegaPrime optical components
temperatures = ["273 K"] # Typical temperature of the corrector optics
[instruments.filters]
path = "filters"
[instruments.filters.transmission]
vars = ['id']
files = [
    {id = 'u', name = "u", file = "u.MP9302.fits"},
    {id = 'g', name = "g", file = "g.MP9402.fits"},
    {id = 'r', name = "r", file = "r.MP9602.fits", default=true},
    {id = 'i', name = "i", file = "i.MP9703.fits"},
    {id = 'z', name = "z", file = "z.MP9901.fits"},
    {id = 'gri', name = "gri", file = "gri.MP9605.fits"},
    {id = 'cahk', name = "CaHK", file = "CaHK.MP9303.fits"},
    {id = 'oiii', name = "OIII", file = "OIII.MP9501.fits"},
    {id = 'oiiioff', name = "OIII off", file = "OIIIOFF.MP9502.fits"},
    {id = 'ha', name = "Ha", file = "Ha.MP9603.fits"},
    {id = 'haoff', name = "Ha off", file = "HaOFF.MP9604.fits"}
]
[instruments.filters.emission]
# Emission as a function of wavelength for all MegaPrime optical components
temperatures = ["273 K"] # Typical temperature of the corrector optics
[instruments.detector]
# Average MegaCam E2V CCD characteristics
path = "detector"
gain = "1.62 electron/adu"
ron = "5. electron"
scale = "[0.186, 0.186] arcsec/pix"
full_well = "240000 electron"
range = "65536 adu"
bias = "1200. adu"
[instruments.detector.transmission]
path = "qe"
# Average MegaCam CCD quantum efficiency as a function of wavelength
files = [ {file = "MegaCam_QE.average.fits"} ]
[instruments.detector.emission]
temperatures = ["153 K"]


[[instruments]]
# WIRCam instrument. Most infos derived from the WIRCam web pages at
# https://www.cfht.hawaii.edu/Instruments/Imaging/WIRCam/
id = 'wircam'
name = "WIRCam"
description = "The WIRCam instrument"
path = "instruments/wircam"
wavelength_range = "[900., 2600.] nm"
obstruction_area = "1.734 m2" # Forged by subtracting 8.4m2 from 10.134 m2
overhead = "10. s"
site_id = 'mko'
telescope_id = 'cfht'
[instruments.optics]
# WIRCam optical properties
path = "optics"
[instruments.optics.transmission]
# Transmission as a function of wavelength for all WIRCam optical components
path = "transmission"
files = [ {file = "WIRCam_transmission.fits"} ]
[instruments.optics.emission]
# Emission as a function of wavelength for all WIRCam optical components
temperatures = ["273 K"]
[instruments.filters]
path = "filters"
[instruments.filters.transmission]
vars = ['id']
files = [
    {id = 'y', name = "Y", file = "Y.WC8002.fits", default=true},
    {id = 'j', name = "J", file = "J.WC8103.fits"},
    {id = 'h', name = "H", file = "H.WC8202.fits"},
    {id = 'ks', name = "Ks", file = "Ks.WC8302.fits"},
    {id = 'h2', name = "H2 (1-0)", file = "H2.WC8304.fits"},
    {id = 'lowoh1', name = "Low OH1", file = "LowOH1.WC8104.fits"},
    {id = 'lowoh2', name = "Low OH2", file = "LowOH2.WC8102.fits"},
    {id = 'ch4on', name = "CH4 on", file = "CH4On.WC8203.fits"},
    {id = 'ch4off', name = "CH4 off", file = "CH4Off.WC8204.fits"},
    {id = 'kcont', name = "K cont.", file = "Kcont.WC8303.fits"},
    {id = 'brg', name = "Br.gamma", file = "BrG.WC8305.fits"},
    {id = 'w', name = "W", file = "W.WC8105.fits"}
]
[instruments.filters.emission]
temperatures = ["80 K"]
[instruments.detector]
# Average WIRCam Hawaii-2RG CMOS characteristics
gain = "3.8 electron/adu"
ron = "30. electron"
scale = "[0.306, 0.306] arcsec/pix"
path = "detector"
full_well = "130000 electron"
range = "65536 adu"
bias = "0. adu"
[instruments.detector.transmission]
path = "qe"
# Average Hawaii-2RG quantum efficiency as a function of wavelength from the
# science-grade sample of Finger+2006, which has a 2.5 μm cut-off; see
# https://info.cfht.hawaii.edu/display/~bertin/WIRCam+quantum+efficiency+curve
files = [ {file = "WIRCam_QE.average.fits"} ]
[instruments.detector.emission]
temperatures = ["80 K"]


