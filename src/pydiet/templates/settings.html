<ion-list>
  <ion-list-header>Settings</ion-list-header>
  <ion-item slot="start">
    <ion-label position="fixed">Theme</ion-label>
    <ion-segment id="theme-segment" slot="end" value="auto" scrollable=true mode="ios">
	{# Theme radio buttons will be inserted here by JS code #}
    </ion-segment>
  </ion-item>
  <ion-item-divider></ion-item-divider>
  <ion-item slot="start">
    <ion-label position="fixed">Camera</ion-label>
    <ion-segment id="camera-segment" value="megacam" scrollable=true mode="ios">
	{# Camera radio buttons will be inserted here by JS code #}
    </ion-segment>
  </ion-item>
</ion-list>
